repos:
  # Ruff for fast linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        name: ruff-lint
      - id: ruff-format
        name: ruff-format

  # MyPy for static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        additional_dependencies: [
          types-requests,
          types-python-dateutil,
          pydantic,
          fastapi,
          "openai-agents[litellm]==0.14.6",
        ]
        args: [--install-types, --non-interactive]

  # Built-in hooks for basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: debug-statements
      - id: check-case-conflict
      - id: check-docstring-first

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]

  # Local hook: fail if external-telemetry code is added to the codebase
  - repo: local
    hooks:
      - id: check-no-external-telemetry
        name: no-external-telemetry
        # Use `uv run python` (not `python3`) so the hook works on
        # Windows, where `python3` is a Microsoft Store stub that
        # silently fails. `uv` is in PATH on this host.
        entry: uv run python tools/check_no_external_telemetry.py
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

  # Local hook: full local CI gate before any push to GitHub.
  # Mirrors `.github/workflows/ci.yml` -> `ci-success` aggregate job
  # (ruff lint + ruff format + pytest; bandit + telemetry reported but
  # non-gating by default). Type-check (mypy/pyright) is intentionally
  # excluded — see the comment in `tools/ci_gate.py`.
  #
  # Install with: `uv run pre-commit install --hook-type pre-push`
  - repo: local
    hooks:
      - id: ci-gate
        name: ci-gate (pre-push)
        # Same `uv run python` rationale as above — Windows-friendly.
        # --pr scopes the gate to the staged diff so a pre-existing dirty
        # tree (untracked files from a previous session) doesn't block a
        # clean PR. Without --pr, the gate runs against the whole working
        # tree and pre-existing failures would block every push. See
        # tools/ci_gate.py for the --pr / --all semantics.
        entry: uv run python tools/ci_gate.py --pr
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

  # Additional Python code quality checks
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade
        args: [--py312-plus]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
