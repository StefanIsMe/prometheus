name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch / PR — saves minutes on
# auto-format PRs and Dependabot rebases.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions; jobs that need more declare them explicitly.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + format (ruff)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # 2. Type checking (mypy strict + pyright strict)
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check (${{ matrix.checker }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        checker: [mypy, pyright]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: mypy
        if: matrix.checker == 'mypy'
        run: uv run mypy prometheus/

      - name: pyright
        if: matrix.checker == 'pyright'
        run: uv run pyright prometheus/

  # ---------------------------------------------------------------------------
  # 3. Security lint (bandit)
  # ---------------------------------------------------------------------------
  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Generate bandit SARIF
        run: |
          mkdir -p bandit-out
          uv run bandit -r prometheus/ -c pyproject.toml \
            -f sarif -o bandit.sarif || true

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # 4. Tests on the supported Python matrix
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Pytest
        run: uv run pytest -ra --strict-markers --strict-config -q

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov
            .coverage
            coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 5. Aggregate gate — required for branch protection
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI success
    needs: [lint, type-check, security, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs passed
        run: |
          # Only hard-gate the jobs that are not allowed to fail.
          # The type-check job is continue-on-error and serves as a
          # surfacing mechanism, not a merge blocker. Use literal job
          # names so GitHub's workflow parser doesn't choke on the
          # for-loop variable expansion.
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Required job 'lint' did not pass (result: ${{ needs.lint.result }})."
            exit 1
          fi
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "Required job 'security' did not pass (result: ${{ needs.security.result }})."
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Required job 'test' did not pass (result: ${{ needs.test.result }})."
            exit 1
          fi
          echo "All required jobs passed."
